<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a90e2">
    <title>3D Car Simulator | Infinite Driving</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        /* Welcome Screen */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .welcome-card {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
            font-size: 1.8rem;
        }

        .vehicle-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .vehicle-option {
            background: #2c3e50;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .vehicle-option.selected {
            background: #e67e22;
            transform: scale(1.05);
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.1s;
        }
        .color-swatch.selected {
            transform: scale(1.2);
            border-color: gold;
        }
        .start-btn {
            background: #27ae60;
            border: none;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        .start-btn:active { transform: scale(0.97);}

        /* Driving UI */
        #game-ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 100;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }
        .steering-panel {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 120px;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .steering-wheel-icon {
            width: 80px;
            height: 80px;
            background: #34495e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            border: 3px solid #95a5a6;
            transition: transform 0.05s linear;
            cursor: grab;
            touch-action: none;
        }
        .pedals {
            display: flex;
            gap: 15px;
        }
        .gas-pedal, .brake-pedal {
            width: 80px;
            height: 120px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .gas-pedal {
            background: #27ae60;
            box-shadow: 0 6px 0 #1e8449;
        }
        .brake-pedal {
            background: #e74c3c;
            box-shadow: 0 6px 0 #c0392b;
        }
        .gas-pedal:active, .brake-pedal:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0;
        }
        .speedometer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            color: #f39c12;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 150;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 700px) {
            .steering-panel { width: 90px; height: 90px; }
            .steering-wheel-icon { width: 60px; height: 60px; font-size: 30px; }
            .gas-pedal, .brake-pedal { width: 65px; height: 100px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div class="welcome-card">
            <img class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f4d03f'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Ccircle cx='65' cy='40' r='5' fill='black'/%3E%3Cpath d='M35 65 Q50 80 65 65' stroke='black' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Ctext x='50' y='30' font-size='24' text-anchor='middle' fill='%23b3413b'%3E⭐%3C/text%3E%3C/svg%3E" alt="Son">
            <h2>🏎️ Junior Racer 🏎️</h2>
            <div class="vehicle-select">
                <div class="vehicle-option" data-vehicle="car">🚘 Car</div>
                <div class="vehicle-option" data-vehicle="bus">🚌 Bus</div>
            </div>
            <div class="color-palette" id="color-palette">
                <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c"></div>
                <div class="color-swatch" style="background:#3498db;" data-color="#3498db"></div>
                <div class="color-swatch" style="background:#2ecc71;" data-color="#2ecc71"></div>
                <div class="color-swatch" style="background:#f1c40f;" data-color="#f1c40f"></div>
                <div class="color-swatch" style="background:#e67e22;" data-color="#e67e22"></div>
                <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6"></div>
                <div class="color-swatch" style="background:#1abc9c;" data-color="#1abc9c"></div>
            </div>
            <button class="start-btn" id="start-game">🏁 START DRIVING 🏁</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="controls-row">
            <div class="steering-panel">
                <div class="steering-wheel-icon" id="steering-wheel">⌘</div>
            </div>
            <div class="pedals">
                <div class="gas-pedal" id="gas-pedal">GAS</div>
                <div class="brake-pedal" id="brake-pedal">BRAKE</div>
            </div>
        </div>
    </div>
    <div id="speedometer" class="speedometer hidden">
        🚀 <span id="speed-value">0</span> km/h
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game state
        let scene, camera, renderer;
        let car;
        let currentSpeed = 0;
        let steeringInput = 0;
        let gasPressed = false;
        let brakePressed = false;
        let carAngle = 0;
        let carX = 0;
        let carZ = 0;
        
        // Physics constants
        const ACCELERATION = 8.0;
        const BRAKE_FORCE = 10.0;
        const FRICTION = 0.97;
        const MAX_SPEED_FORWARD = 45;
        const MAX_SPEED_REVERSE = -20;
        const STEERING_SENSITIVITY = 2.5;
        
        // World objects
        let roadSegments = [];
        let buildings = [];
        let trees = [];
        let roadLength = 0;
        let lastRoadZ = -50;
        
        // Colors
        let vehicleType = "car";
        let carColor = "#e74c3c";
        
        function createCar(color, type) {
            const group = new THREE.Group();
            let width = 0.8, height = 0.4, length = 1.2;
            let wheelRadius = 0.12;
            
            if (type === "bus") {
                width = 0.9;
                height = 0.6;
                length = 1.8;
                wheelRadius = 0.14;
            }
            
            // Body
            const bodyGeo = new THREE.BoxGeometry(width, height, length);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = height/2;
            body.castShadow = true;
            group.add(body);
            
            // Roof
            const roofGeo = new THREE.BoxGeometry(width*0.85, height*0.4, length*0.85);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.5 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = height + 0.1;
            group.add(roof);
            
            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, 0.1, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 });
            const wheelPositions = [
                [-width/2 + 0.15, 0.1, -length/2 + 0.2], [width/2 - 0.15, 0.1, -length/2 + 0.2],
                [-width/2 + 0.15, 0.1, length/2 - 0.2], [width/2 - 0.15, 0.1, length/2 - 0.2]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            return group;
        }
        
        function createRoadSegment(z) {
            const group = new THREE.Group();
            
            // Road plane
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
            const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 10), roadMat);
            road.rotation.x = -Math.PI/2;
            road.position.y = -0.05;
            road.receiveShadow = true;
            group.add(road);
            
            // Road lines
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd88 });
            for (let i = -4; i <= 4; i += 2) {
                const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.8), lineMat);
                line.position.set(i, 0.02, 0);
                group.add(line);
            }
            
            // Center dashed line
            for (let i = -3; i <= 3; i += 1.5) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
                dash.position.set(0, 0.02, i);
                group.add(dash);
            }
            
            group.position.z = z;
            return group;
        }
        
        function createBuilding(x, z, color) {
            const height = 0.8 + Math.random() * 1.5;
            const width = 0.6 + Math.random() * 0.5;
            const depth = 0.6 + Math.random() * 0.5;
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, height/2, z);
            building.castShadow = true;
            return building;
        }
        
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 0.2;
            group.add(trunk);
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
            foliage.position.y = 0.5;
            group.add(foliage);
            group.position.set(x, 0, z);
            return group;
        }
        
        function generateWorld() {
            // Generate infinite road segments
            for (let i = -5; i <= 15; i++) {
                const z = i * 10;
                const segment = createRoadSegment(z);
                scene.add(segment);
                roadSegments.push(segment);
            }
            lastRoadZ = 150;
            
            // Generate buildings and trees on sides
            const colors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0x96ceb4, 0xffeaa7, 0xdfe6e9, 0xa8e6cf];
            
            for (let z = -40; z <= 100; z += 4) {
                // Left side
                const leftX = -4.5 - Math.random() * 1.5;
                const rightX = 4.5 + Math.random() * 1.5;
                
                if (Math.random() > 0.3) {
                    const building = createBuilding(leftX, z, colors[Math.floor(Math.random() * colors.length)]);
                    scene.add(building);
                    buildings.push(building);
                } else {
                    const tree = createTree(leftX, z);
                    scene.add(tree);
                    trees.push(tree);
                }
                
                if (Math.random() > 0.3) {
                    const building = createBuilding(rightX, z, colors[Math.floor(Math.random() * colors.length)]);
                    scene.add(building);
                    buildings.push(building);
                } else {
                    const tree = createTree(rightX, z);
                    scene.add(tree);
                    trees.push(tree);
                }
            }
        }
        
        function updateWorld(carZPos) {
            // Move road segments that are behind
            roadSegments.forEach(segment => {
                if (segment.position.z < carZPos - 25) {
                    segment.position.z += roadSegments.length * 10;
                }
            });
            
            // Recycle buildings and trees
            const recycleThreshold = carZPos - 30;
            const newZThreshold = carZPos + 40;
            
            buildings.forEach(building => {
                if (building.position.z < recycleThreshold) {
                    building.position.z = newZThreshold + Math.random() * 20;
                    const side = Math.random() > 0.5 ? -4.5 - Math.random() * 1.5 : 4.5 + Math.random() * 1.5;
                    building.position.x = side;
                }
            });
            
            trees.forEach(tree => {
                if (tree.position.z < recycleThreshold) {
                    tree.position.z = newZThreshold + Math.random() * 20;
                    const side = Math.random() > 0.5 ? -4.5 - Math.random() * 1.5 : 4.5 + Math.random() * 1.5;
                    tree.position.x = side;
                }
            });
        }
        
        function updatePhysics(deltaTime) {
            // Gas and brake
            if (gasPressed) {
                currentSpeed += ACCELERATION * deltaTime;
                if (currentSpeed > MAX_SPEED_FORWARD) currentSpeed = MAX_SPEED_FORWARD;
            }
            if (brakePressed) {
                if (currentSpeed > 0) {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < 0) currentSpeed = 0;
                } else {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < MAX_SPEED_REVERSE) currentSpeed = MAX_SPEED_REVERSE;
                }
            }
            
            // Friction when no input
            if (!gasPressed && !brakePressed) {
                currentSpeed *= FRICTION;
                if (Math.abs(currentSpeed) < 0.1) currentSpeed = 0;
            }
            
            // Steering - only works when moving
            if (Math.abs(currentSpeed) > 0.5) {
                let steerMultiplier = currentSpeed > 0 ? 1 : -0.8; // Reverse steering feels natural
                carAngle += steeringInput * STEERING_SENSITIVITY * deltaTime * steerMultiplier * (Math.abs(currentSpeed) / 30);
                carAngle = Math.min(0.8, Math.max(-0.8, carAngle));
                
                // Move car left/right
                carX += steeringInput * 8 * deltaTime * steerMultiplier;
                carX = Math.min(3.5, Math.max(-3.5, carX));
            }
            
            // Move forward/back
            carZ += currentSpeed * deltaTime;
            
            // Apply rotation
            if (Math.abs(currentSpeed) > 0.5) {
                car.rotation.y = carAngle;
            } else {
                car.rotation.y *= 0.95;
                carAngle *= 0.95;
            }
            
            // Update car position
            car.position.x = carX;
            car.position.z = carZ;
            
            // Update camera (chase camera)
            camera.position.x = carX * 0.5;
            camera.position.z = carZ + 6;
            camera.position.y = 3.5;
            camera.lookAt(carX, 0.5, carZ);
            
            // Update infinite world
            updateWorld(carZ);
            
            // Update UI
            document.getElementById('speed-value').innerText = Math.floor(Math.abs(currentSpeed));
        }
        
        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 120);
            
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, 6);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);
            const backLight = new THREE.PointLight(0x4466cc, 0.3);
            backLight.position.set(0, 5, -5);
            scene.add(backLight);
            
            // Create car
            car = createCar(carColor, vehicleType);
            car.castShadow = true;
            scene.add(car);
            
            // Generate world
            generateWorld();
            
            // Start animation
            let lastTime = performance.now();
            function animate() {
                const now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                updatePhysics(delta);
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Event handlers
        document.getElementById('start-game').addEventListener('click', () => {
            vehicleType = document.querySelector('.vehicle-option.selected').getAttribute('data-vehicle');
            carColor = document.querySelector('.color-swatch.selected').getAttribute('data-color');
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('speedometer').classList.remove('hidden');
            
            initGame();
            
            // Setup controls
            const gasPedal = document.getElementById('gas-pedal');
            const brakePedal = document.getElementById('brake-pedal');
            
            const startGas = () => gasPressed = true;
            const endGas = () => gasPressed = false;
            const startBrake = () => brakePressed = true;
            const endBrake = () => brakePressed = false;
            
            gasPedal.addEventListener('mousedown', startGas);
            gasPedal.addEventListener('mouseup', endGas);
            gasPedal.addEventListener('touchstart', startGas);
            gasPedal.addEventListener('touchend', endGas);
            brakePedal.addEventListener('mousedown', startBrake);
            brakePedal.addEventListener('mouseup', endBrake);
            brakePedal.addEventListener('touchstart', startBrake);
            brakePedal.addEventListener('touchend', endBrake);
            
            // Steering wheel
            const wheel = document.getElementById('steering-wheel');
            let active = false;
            let startX = 0;
            
            wheel.addEventListener('mousedown', (e) => { active = true; startX = e.clientX; });
            window.addEventListener('mousemove', (e) => {
                if (!active) return;
                let delta = (e.clientX - startX) / 50;
                delta = Math.min(1, Math.max(-1, delta));
                steeringInput = delta;
                wheel.style.transform = `rotate(${delta * 45}deg)`;
            });
            window.addEventListener('mouseup', () => { active = false; steeringInput = 0; wheel.style.transform = 'rotate(0deg)'; });
            
            wheel.addEventListener('touchstart', (e) => { active = true; startX = e.touches[0].clientX; });
            window.addEventListener('touchmove', (e) => {
                if (!active) return;
                let delta = (e.touches[0].clientX - startX) / 50;
                delta = Math.min(1, Math.max(-1, delta));
                steeringInput = delta;
                wheel.style.transform = `rotate(${delta * 45}deg)`;
            });
            window.addEventListener('touchend', () => { active = false; steeringInput = 0; wheel.style.transform = 'rotate(0deg)'; });
        });
        
        // Selection handlers
        document.querySelectorAll('.vehicle-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.vehicle-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });
        
        document.querySelectorAll('.color-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                sw.classList.add('selected');
            });
        });
        
        document.querySelector('.vehicle-option').classList.add('selected');
        document.querySelector('.color-swatch').classList.add('selected');
    </script>
</body>
</html>
