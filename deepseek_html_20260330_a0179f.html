<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a90e2">
    <title>3D Car Simulator | Real Driving</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            background: #000;
        }

        /* Welcome Screen */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .welcome-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
            font-size: 1.8rem;
        }

        .vehicle-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .vehicle-option {
            background: #2c3e50;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .vehicle-option.selected {
            background: #e67e22;
            transform: scale(1.05);
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.1s;
        }
        .color-swatch.selected {
            transform: scale(1.2);
            border-color: gold;
        }
        .speed-limit-slider {
            margin: 20px 0;
        }
        .speed-limit-slider label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .start-btn {
            background: #27ae60;
            border: none;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        .start-btn:active { transform: scale(0.97);}

        /* Driving UI */
        #game-ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 100;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }
        .steering-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 120px;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .steering-wheel-icon {
            width: 90px;
            height: 90px;
            background: #34495e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            color: white;
            border: 3px solid #95a5a6;
            transition: transform 0.05s linear;
            cursor: grab;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .steering-wheel-icon:active {
            cursor: grabbing;
        }
        .pedals {
            display: flex;
            gap: 15px;
        }
        .gas-pedal, .brake-pedal {
            width: 85px;
            height: 130px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .gas-pedal {
            background: #27ae60;
            box-shadow: 0 6px 0 #1e8449;
        }
        .brake-pedal {
            background: #e74c3c;
            box-shadow: 0 6px 0 #c0392b;
        }
        .gas-pedal:active, .brake-pedal:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0;
        }
        .speedometer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #f39c12;
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 150;
            border: 2px solid #f39c12;
        }
        .instruction {
            position: fixed;
            bottom: 170px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            z-index: 150;
            pointer-events: none;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 700px) {
            .steering-panel { width: 100px; height: 100px; }
            .steering-wheel-icon { width: 70px; height: 70px; font-size: 35px; }
            .gas-pedal, .brake-pedal { width: 70px; height: 110px; font-size: 20px; }
            .speedometer { font-size: 1.4rem; padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div class="welcome-card">
            <img class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f4d03f'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Ccircle cx='65' cy='40' r='5' fill='black'/%3E%3Cpath d='M35 65 Q50 80 65 65' stroke='black' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Ctext x='50' y='30' font-size='24' text-anchor='middle' fill='%23b3413b'%3E⭐%3C/text%3E%3C/svg%3E" alt="My Son">
            <h2>🏎️ Junior Racer 🏎️</h2>
            <div class="vehicle-select">
                <div class="vehicle-option" data-vehicle="car">🚘 Car</div>
                <div class="vehicle-option" data-vehicle="bus">🚌 Bus</div>
            </div>
            <div class="color-palette" id="color-palette">
                <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c"></div>
                <div class="color-swatch" style="background:#3498db;" data-color="#3498db"></div>
                <div class="color-swatch" style="background:#2ecc71;" data-color="#2ecc71"></div>
                <div class="color-swatch" style="background:#f1c40f;" data-color="#f1c40f"></div>
                <div class="color-swatch" style="background:#e67e22;" data-color="#e67e22"></div>
                <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6"></div>
                <div class="color-swatch" style="background:#1abc9c;" data-color="#1abc9c"></div>
            </div>
            <div class="speed-limit-slider">
                <label>⚡ Max Speed Limit: <span id="speed-limit-value">80</span> km/h</label>
                <input type="range" id="max-speed-limit" min="30" max="120" value="80" step="5">
            </div>
            <button class="start-btn" id="start-game">🏁 START DRIVING 🏁</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="controls-row">
            <div class="steering-panel">
                <div class="steering-wheel-icon" id="steering-wheel">⌘</div>
            </div>
            <div class="pedals">
                <div class="gas-pedal" id="gas-pedal">GAS</div>
                <div class="brake-pedal" id="brake-pedal">BRAKE</div>
            </div>
        </div>
    </div>
    <div id="speedometer" class="speedometer hidden">
        🚀 <span id="speed-value">0</span> km/h
    </div>
    <div class="instruction hidden" id="instruction">
        🎮 Drag steering wheel LEFT/RIGHT to turn the car
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game state
        let scene, camera, renderer;
        let car;
        let currentSpeed = 0;
        let steeringInput = 0;
        let gasPressed = false;
        let brakePressed = false;
        let carRotation = 0;
        let carX = 0;
        let carZ = 0;
        let maxSpeed = 80;
        
        // Physics constants
        const ACCELERATION = 12.0;
        const BRAKE_FORCE = 15.0;
        const FRICTION = 0.96;
        const MAX_SPEED_REVERSE = -25;
        const STEERING_FORCE = 4.5;
        
        // World objects
        let roadSegments = [];
        let buildings = [];
        let trees = [];
        
        // Colors
        let vehicleType = "car";
        let carColor = "#e74c3c";
        
        function createCar(color, type) {
            const group = new THREE.Group();
            let width = 0.9, height = 0.45, length = 1.4;
            let wheelRadius = 0.14;
            
            if (type === "bus") {
                width = 1.0;
                height = 0.7;
                length = 2.0;
                wheelRadius = 0.16;
            }
            
            // Main body
            const bodyGeo = new THREE.BoxGeometry(width, height, length);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = height/2;
            body.castShadow = true;
            group.add(body);
            
            // Windows
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.7 });
            const frontWind = new THREE.Mesh(new THREE.BoxGeometry(width*0.7, height*0.3, 0.1), windowMat);
            frontWind.position.set(0, height*0.7, length/2);
            group.add(frontWind);
            
            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, 0.12, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
            const wheelPositions = [
                [-width/2 + 0.18, 0.12, -length/2 + 0.25], [width/2 - 0.18, 0.12, -length/2 + 0.25],
                [-width/2 + 0.18, 0.12, length/2 - 0.25], [width/2 - 0.18, 0.12, length/2 - 0.25]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            return group;
        }
        
        function createRoadSegment(z) {
            const group = new THREE.Group();
            
            // Main road (continuous)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.6 });
            const road = new THREE.Mesh(new THREE.PlaneGeometry(8, 20), roadMat);
            road.rotation.x = -Math.PI/2;
            road.position.y = -0.05;
            road.receiveShadow = true;
            group.add(road);
            
            // Center line (dashed)
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd88 });
            for (let i = -8; i <= 8; i += 2) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.8), lineMat);
                dash.position.set(0, 0.02, i);
                group.add(dash);
            }
            
            // Lane markings
            const laneMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            for (let side = -2.5; side <= 2.5; side += 5) {
                const laneLine = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 20), laneMat);
                laneLine.position.set(side, 0.02, 0);
                group.add(laneLine);
            }
            
            group.position.z = z;
            return group;
        }
        
        function createBuilding(x, z, size = 1) {
            const height = 1.2 + Math.random() * 1.5;
            const width = 0.8 + Math.random() * 0.6;
            const depth = 0.8 + Math.random() * 0.6;
            const geometry = new THREE.BoxGeometry(width * size, height * size, depth * size);
            const colors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0x96ceb4, 0xffeaa7, 0xa8e6cf, 0xff8c42];
            const material = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.4 });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, (height * size)/2, z);
            building.castShadow = true;
            return building;
        }
        
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.3), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            trunk.position.y = 0.3;
            group.add(trunk);
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
            foliage1.position.y = 0.7;
            group.add(foliage1);
            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.32, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x27ae60 }));
            foliage2.position.y = 1.05;
            group.add(foliage2);
            group.position.set(x, 0, z);
            return group;
        }
        
        function generateWorld() {
            // Create road segments (continuous)
            for (let i = -5; i <= 20; i++) {
                const z = i * 12;
                const segment = createRoadSegment(z);
                scene.add(segment);
                roadSegments.push(segment);
            }
            
            // Create buildings and trees on sides (larger and more visible)
            for (let z = -50; z <= 100; z += 5) {
                // Left side buildings
                const leftX = -5.5 - Math.random() * 1.5;
                const rightX = 5.5 + Math.random() * 1.5;
                
                // 70% chance of building, 30% tree
                if (Math.random() > 0.3) {
                    const building = createBuilding(leftX, z, 1.2);
                    scene.add(building);
                    buildings.push(building);
                } else {
                    const tree = createTree(leftX, z);
                    scene.add(tree);
                    trees.push(tree);
                }
                
                if (Math.random() > 0.3) {
                    const building = createBuilding(rightX, z, 1.2);
                    scene.add(building);
                    buildings.push(building);
                } else {
                    const tree = createTree(rightX, z);
                    scene.add(tree);
                    trees.push(tree);
                }
            }
        }
        
        function updateWorld(carZPos) {
            // Recycle road segments
            roadSegments.forEach(segment => {
                if (segment.position.z < carZPos - 30) {
                    segment.position.z += roadSegments.length * 12;
                }
            });
            
            // Recycle buildings and trees
            const recycleThreshold = carZPos - 40;
            const newZThreshold = carZPos + 60;
            
            buildings.forEach(building => {
                if (building.position.z < recycleThreshold) {
                    building.position.z = newZThreshold + Math.random() * 30;
                    const side = Math.random() > 0.5 ? -5.5 - Math.random() * 2 : 5.5 + Math.random() * 2;
                    building.position.x = side;
                }
            });
            
            trees.forEach(tree => {
                if (tree.position.z < recycleThreshold) {
                    tree.position.z = newZThreshold + Math.random() * 30;
                    const side = Math.random() > 0.5 ? -5.5 - Math.random() * 2 : 5.5 + Math.random() * 2;
                    tree.position.x = side;
                }
            });
        }
        
        function updatePhysics(deltaTime) {
            // Gas pedal - accelerate forward
            if (gasPressed) {
                currentSpeed += ACCELERATION * deltaTime;
                if (currentSpeed > maxSpeed) currentSpeed = maxSpeed;
            }
            
            // Brake pedal - slow down or reverse
            if (brakePressed) {
                if (currentSpeed > 0) {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < 0) currentSpeed = 0;
                } else if (currentSpeed === 0) {
                    currentSpeed = -5; // Start reversing
                } else {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < MAX_SPEED_REVERSE) currentSpeed = MAX_SPEED_REVERSE;
                }
            }
            
            // Friction when no pedals pressed
            if (!gasPressed && !brakePressed) {
                currentSpeed *= FRICTION;
                if (Math.abs(currentSpeed) < 0.2) currentSpeed = 0;
            }
            
            // STEERING - Car turns when steering wheel is turned AND car is moving
            if (Math.abs(currentSpeed) > 1) {
                // Steering sensitivity based on speed (slower at high speed)
                let turnMultiplier = currentSpeed > 0 ? 1 : -0.8;
                let turnAmount = steeringInput * STEERING_FORCE * deltaTime * turnMultiplier * (1 - Math.abs(currentSpeed) / maxSpeed * 0.5);
                
                carRotation += turnAmount;
                carRotation = Math.min(0.7, Math.max(-0.7, carRotation));
                
                // Car X movement based on rotation (this makes the car actually turn)
                let moveX = carRotation * Math.abs(currentSpeed) * 3.5 * deltaTime;
                carX += moveX;
                
                // Road boundaries
                carX = Math.min(3.8, Math.max(-3.8, carX));
            }
            
            // Move car forward/backward
            carZ += currentSpeed * deltaTime;
            
            // Apply rotation to car mesh
            car.rotation.y = carRotation;
            
            // Update car position
            car.position.x = carX;
            car.position.z = carZ;
            
            // Update world
            updateWorld(carZ);
            
            // CAMERA: Behind car, looking forward
            const targetCamX = carX * 0.5;
            const targetCamZ = carZ - 6;
            camera.position.x += (targetCamX - camera.position.x) * 0.15;
            camera.position.z += (targetCamZ - camera.position.z) * 0.15;
            camera.position.y = 3.5;
            camera.lookAt(car.position);
            
            // Update speed display
            document.getElementById('speed-value').innerText = Math.floor(Math.abs(currentSpeed));
        }
        
        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1a2a);
            scene.fog = new THREE.FogExp2(0x0a1a2a, 0.005);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 3.5, 6);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 12, 8);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466aa, 0.4);
            fillLight.position.set(0, 5, 0);
            scene.add(fillLight);
            
            // Create car
            car = createCar(carColor, vehicleType);
            car.castShadow = true;
            scene.add(car);
            
            // Generate world
            generateWorld();
            
            // Reset position
            carZ = 0;
            carX = 0;
            currentSpeed = 0;
            carRotation = 0;
            
            // Animation loop
            let lastTime = performance.now();
            function animate() {
                const now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                updatePhysics(delta);
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Welcome screen handlers
        document.getElementById('start-game').addEventListener('click', () => {
            vehicleType = document.querySelector('.vehicle-option.selected').getAttribute('data-vehicle');
            carColor = document.querySelector('.color-swatch.selected').getAttribute('data-color');
            maxSpeed = parseInt(document.getElementById('max-speed-limit').value);
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('speedometer').classList.remove('hidden');
            document.getElementById('instruction').classList.remove('hidden');
            
            initGame();
            
            // Pedal controls
            const gasPedal = document.getElementById('gas-pedal');
            const brakePedal = document.getElementById('brake-pedal');
            
            gasPedal.addEventListener('mousedown', () => gasPressed = true);
            gasPedal.addEventListener('mouseup', () => gasPressed = false);
            gasPedal.addEventListener('mouseleave', () => gasPressed = false);
            gasPedal.addEventListener('touchstart', () => gasPressed = true);
            gasPedal.addEventListener('touchend', () => gasPressed = false);
            
            brakePedal.addEventListener('mousedown', () => brakePressed = true);
            brakePedal.addEventListener('mouseup', () => brakePressed = false);
            brakePedal.addEventListener('mouseleave', () => brakePressed = false);
            brakePedal.addEventListener('touchstart', () => brakePressed = true);
            brakePedal.addEventListener('touchend', () => brakePressed = false);
            
            // Steering wheel with proper rotation and car control
            const wheel = document.getElementById('steering-wheel');
            let active = false;
            let startX = 0;
            
            const handleMove = (clientX) => {
                if (!active) return;
                let delta = (clientX - startX) / 35;
                delta = Math.min(0.9, Math.max(-0.9, delta));
                steeringInput = delta;
                const rotationDeg = delta * 70;
                wheel.style.transform = `rotate(${rotationDeg}deg)`;
            };
            
            const handleStart = (e) => {
                active = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                startX = clientX;
                e.preventDefault();
            };
            
            const handleEnd = () => {
                active = false;
                steeringInput = 0;
                wheel.style.transform = `rotate(0deg)`;
            };
            
            wheel.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', (e) => { if (active) handleMove(e.clientX); });
            window.addEventListener('mouseup', handleEnd);
            
            wheel.addEventListener('touchstart', handleStart);
            window.addEventListener('touchmove', (e) => { if (active && e.touches[0]) handleMove(e.touches[0].clientX); });
            window.addEventListener('touchend', handleEnd);
        });
        
        // Speed limit slider display
        const speedLimitSlider = document.getElementById('max-speed-limit');
        const speedLimitValue = document.getElementById('speed-limit-value');
        speedLimitSlider.addEventListener('input', () => {
            speedLimitValue.innerText = speedLimitSlider.value;
        });
        
        // Selection handlers
        document.querySelectorAll('.vehicle-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.vehicle-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });
        
        document.querySelectorAll('.color-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                sw.classList.add('selected');
            });
        });
        
        document.querySelector('.vehicle-option').classList.add('selected');
        document.querySelector('.color-swatch').classList.add('selected');
    </script>
</body>
</html>
