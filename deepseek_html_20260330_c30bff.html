<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a90e2">
    <title>3D Car Simulator | Curves & Junctions</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            background: #000;
        }

        /* Welcome Screen */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .welcome-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
            font-size: 1.8rem;
        }

        .vehicle-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .vehicle-option {
            background: #2c3e50;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .vehicle-option.selected {
            background: #e67e22;
            transform: scale(1.05);
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.1s;
        }
        .color-swatch.selected {
            transform: scale(1.2);
            border-color: gold;
        }
        .start-btn {
            background: #27ae60;
            border: none;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        .start-btn:active { transform: scale(0.97);}

        /* Driving UI */
        #game-ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 100;
        }
        .controls-row {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }
        .steering-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 120px;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .steering-wheel-icon {
            width: 90px;
            height: 90px;
            background: #34495e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            color: white;
            border: 3px solid #95a5a6;
            transition: transform 0.05s linear;
            cursor: grab;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .steering-wheel-icon:active {
            cursor: grabbing;
        }
        .pedals {
            display: flex;
            gap: 15px;
        }
        .gas-pedal, .brake-pedal {
            width: 85px;
            height: 130px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .gas-pedal {
            background: #27ae60;
            box-shadow: 0 6px 0 #1e8449;
        }
        .brake-pedal {
            background: #e74c3c;
            box-shadow: 0 6px 0 #c0392b;
        }
        .gas-pedal:active, .brake-pedal:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0;
        }
        .speedometer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #f39c12;
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 150;
            border: 2px solid #f39c12;
        }
        .instruction {
            position: fixed;
            bottom: 160px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            z-index: 150;
            pointer-events: none;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 700px) {
            .steering-panel { width: 100px; height: 100px; }
            .steering-wheel-icon { width: 70px; height: 70px; font-size: 35px; }
            .gas-pedal, .brake-pedal { width: 70px; height: 110px; font-size: 20px; }
            .speedometer { font-size: 1.4rem; padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <div class="welcome-card">
            <img class="logo-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f4d03f'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Ccircle cx='65' cy='40' r='5' fill='black'/%3E%3Cpath d='M35 65 Q50 80 65 65' stroke='black' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Ctext x='50' y='30' font-size='24' text-anchor='middle' fill='%23b3413b'%3E⭐%3C/text%3E%3C/svg%3E" alt="My Son">
            <h2>🏎️ Junior Racer 🏎️</h2>
            <div class="vehicle-select">
                <div class="vehicle-option" data-vehicle="car">🚘 Car</div>
                <div class="vehicle-option" data-vehicle="bus">🚌 Bus</div>
            </div>
            <div class="color-palette" id="color-palette">
                <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c"></div>
                <div class="color-swatch" style="background:#3498db;" data-color="#3498db"></div>
                <div class="color-swatch" style="background:#2ecc71;" data-color="#2ecc71"></div>
                <div class="color-swatch" style="background:#f1c40f;" data-color="#f1c40f"></div>
                <div class="color-swatch" style="background:#e67e22;" data-color="#e67e22"></div>
                <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6"></div>
                <div class="color-swatch" style="background:#1abc9c;" data-color="#1abc9c"></div>
            </div>
            <button class="start-btn" id="start-game">🏁 START DRIVING 🏁</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="controls-row">
            <div class="steering-panel">
                <div class="steering-wheel-icon" id="steering-wheel">⌘</div>
            </div>
            <div class="pedals">
                <div class="gas-pedal" id="gas-pedal">GAS</div>
                <div class="brake-pedal" id="brake-pedal">BRAKE</div>
            </div>
        </div>
    </div>
    <div id="speedometer" class="speedometer hidden">
        🚀 <span id="speed-value">0</span> km/h
    </div>
    <div class="instruction hidden" id="instruction">
        💡 Drag steering wheel left/right to turn
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game state
        let scene, camera, renderer;
        let car;
        let currentSpeed = 0;
        let steeringInput = 0;
        let gasPressed = false;
        let brakePressed = false;
        let carRotation = 0;
        let carX = 0;
        let carZ = 0;
        
        // Road curve system
        let roadCurve = 0;
        let targetCurve = 0;
        let curvePosition = 0;
        
        // Physics constants
        const ACCELERATION = 8.5;
        const BRAKE_FORCE = 11.0;
        const FRICTION = 0.97;
        const MAX_SPEED_FORWARD = 55;
        const MAX_SPEED_REVERSE = -22;
        const STEERING_SENSITIVITY = 2.8;
        
        // World objects
        let roadPieces = [];
        let sceneryObjects = [];
        let lastRoadZ = -30;
        
        // Colors
        let vehicleType = "car";
        let carColor = "#e74c3c";
        
        function createCar(color, type) {
            const group = new THREE.Group();
            let width = 0.85, height = 0.45, length = 1.3;
            let wheelRadius = 0.13;
            
            if (type === "bus") {
                width = 0.95;
                height = 0.65;
                length = 1.9;
                wheelRadius = 0.15;
            }
            
            // Main body
            const bodyGeo = new THREE.BoxGeometry(width, height, length);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = height/2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Roof/windows
            const roofGeo = new THREE.BoxGeometry(width*0.85, height*0.4, length*0.85);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, roughness: 0.2, metalness: 0.5 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = height + 0.1;
            group.add(roof);
            
            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, 0.12, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.3 });
            const wheelPositions = [
                [-width/2 + 0.18, 0.12, -length/2 + 0.25], [width/2 - 0.18, 0.12, -length/2 + 0.25],
                [-width/2 + 0.18, 0.12, length/2 - 0.25], [width/2 - 0.18, 0.12, length/2 - 0.25]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            // Headlights
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400, emissiveIntensity: 0.3 });
            const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), lightMat);
            leftLight.position.set(-width/2 + 0.15, 0.2, length/2);
            const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), lightMat);
            rightLight.position.set(width/2 - 0.15, 0.2, length/2);
            group.add(leftLight);
            group.add(rightLight);
            
            return group;
        }
        
        function createCurvedRoadSegment(z, curveOffset) {
            const group = new THREE.Group();
            
            // Road surface (wider for curves)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.7 });
            const road = new THREE.Mesh(new THREE.PlaneGeometry(7, 12), roadMat);
            road.rotation.x = -Math.PI/2;
            road.position.y = -0.05;
            road.receiveShadow = true;
            group.add(road);
            
            // Lane markings
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
            for (let i = -2.5; i <= 2.5; i += 2.5) {
                const line = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.05, 1.2), lineMat);
                line.position.set(i, 0.02, 0);
                group.add(line);
            }
            
            // Center dashed line
            for (let i = -4; i <= 4; i += 1.8) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xffaa55 }));
                dash.position.set(0, 0.02, i);
                group.add(dash);
            }
            
            // Edge lines (glow effect for curves)
            const edgeMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const leftEdge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 12), edgeMat);
            leftEdge.position.set(-3.3, 0.01, 0);
            const rightEdge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 12), edgeMat);
            rightEdge.position.set(3.3, 0.01, 0);
            group.add(leftEdge);
            group.add(rightEdge);
            
            group.position.set(curveOffset, 0, z);
            return group;
        }
        
        function createScenery(x, z, type) {
            if (type === 'building') {
                const height = 0.8 + Math.random() * 1.8;
                const width = 0.5 + Math.random() * 0.6;
                const depth = 0.5 + Math.random() * 0.6;
                const geometry = new THREE.BoxGeometry(width, height, depth);
                const colors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0x96ceb4, 0xffeaa7, 0xdfe6e9, 0xa8e6cf, 0xff8c42];
                const material = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.4 });
                const building = new THREE.Mesh(geometry, material);
                building.position.set(x, height/2, z);
                building.castShadow = true;
                return building;
            } else {
                // Tree
                const group = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                trunk.position.y = 0.25;
                group.add(trunk);
                const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
                foliage1.position.y = 0.55;
                group.add(foliage1);
                const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.4, 6), new THREE.MeshStandardMaterial({ color: 0x27ae60 }));
                foliage2.position.y = 0.85;
                group.add(foliage2);
                group.position.set(x, 0, z);
                return group;
            }
        }
        
        function generateInfiniteWorld() {
            // Generate initial road pieces with curves
            for (let z = -40; z <= 60; z += 12) {
                let curveOffset = 0;
                // Create varying curve patterns
                if (Math.abs(z) % 36 < 18) {
                    curveOffset = Math.sin(z * 0.15) * 1.5;
                } else {
                    curveOffset = Math.cos(z * 0.12) * 1.8;
                }
                const roadPiece = createCurvedRoadSegment(z, curveOffset);
                scene.add(roadPiece);
                roadPieces.push({ mesh: roadPiece, originalZ: z, curveOffset: curveOffset });
                
                // Add scenery on sides
                for (let side = -1; side <= 1; side += 2) {
                    const xPos = side * (4.5 + Math.abs(curveOffset) + Math.random() * 1.5);
                    const type = Math.random() > 0.4 ? 'building' : 'tree';
                    const obj = createScenery(xPos, z + (Math.random() - 0.5) * 3, type);
                    scene.add(obj);
                    sceneryObjects.push({ mesh: obj, originalZ: z });
                }
            }
            lastRoadZ = 72;
        }
        
        function updateInfiniteWorld(carZPos) {
            // Recycle road pieces
            roadPieces.forEach(piece => {
                if (piece.mesh.position.z < carZPos - 35) {
                    piece.mesh.position.z += roadPieces.length * 12;
                    // Create new curve pattern for recycled piece
                    let newCurve = Math.sin(piece.mesh.position.z * 0.12) * 1.5 + Math.cos(piece.mesh.position.z * 0.08) * 1.2;
                    newCurve = Math.min(2.5, Math.max(-2.5, newCurve));
                    piece.mesh.position.x = newCurve;
                    piece.curveOffset = newCurve;
                }
            });
            
            // Recycle scenery
            sceneryObjects.forEach(obj => {
                if (obj.mesh.position.z < carZPos - 40) {
                    obj.mesh.position.z += 80;
                    const newX = (Math.random() > 0.5 ? -5.5 : 5.5) + (Math.random() - 0.5) * 2;
                    obj.mesh.position.x = newX;
                }
            });
            
            // Calculate road curve at car position for steering influence
            let currentRoadCurve = 0;
            for (let piece of roadPieces) {
                if (Math.abs(piece.mesh.position.z - carZPos) < 10) {
                    currentRoadCurve = piece.curveOffset;
                    break;
                }
            }
            
            // Apply road curve to car (makes car follow road naturally)
            if (Math.abs(currentSpeed) > 2) {
                let curveForce = (currentRoadCurve - carX) * 0.8 * (Math.abs(currentSpeed) / 40);
                curveForce = Math.min(0.5, Math.max(-0.5, curveForce));
                carX += curveForce * 0.1;
            }
            
            return currentRoadCurve;
        }
        
        function updatePhysics(deltaTime) {
            // Gas and brake controls
            if (gasPressed) {
                currentSpeed += ACCELERATION * deltaTime;
                if (currentSpeed > MAX_SPEED_FORWARD) currentSpeed = MAX_SPEED_FORWARD;
            }
            if (brakePressed) {
                if (currentSpeed > 0) {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < 0) currentSpeed = 0;
                } else {
                    currentSpeed -= BRAKE_FORCE * deltaTime;
                    if (currentSpeed < MAX_SPEED_REVERSE) currentSpeed = MAX_SPEED_REVERSE;
                }
            }
            
            // Friction when no input
            if (!gasPressed && !brakePressed) {
                currentSpeed *= FRICTION;
                if (Math.abs(currentSpeed) < 0.2) currentSpeed = 0;
            }
            
            // Steering - only works when moving
            if (Math.abs(currentSpeed) > 0.5) {
                let steerMultiplier = currentSpeed > 0 ? 1 : -0.7;
                let turnForce = steeringInput * STEERING_SENSITIVITY * deltaTime * steerMultiplier * (Math.abs(currentSpeed) / 35);
                carRotation += turnForce;
                carRotation = Math.min(0.9, Math.max(-0.9, carRotation));
                
                // Car movement based on rotation
                carX += steeringInput * 7 * deltaTime * steerMultiplier;
                carX = Math.min(4.2, Math.max(-4.2, carX));
            }
            
            // Move forward/back
            carZ += currentSpeed * deltaTime;
            
            // Apply car rotation visually
            if (Math.abs(currentSpeed) > 1) {
                car.rotation.y = carRotation;
            } else {
                car.rotation.y *= 0.95;
                carRotation *= 0.95;
            }
            
            // Update car position
            car.position.x = carX;
            car.position.z = carZ;
            
            // Update world and get road curve
            const roadCurveValue = updateInfiniteWorld(carZ);
            
            // CAMERA: Behind the car, facing forward (chase camera)
            const cameraDistance = 7;
            const cameraHeight = 3.2;
            // Camera follows car with slight lag for smoothness
            const targetCamX = carX * 0.6;
            const targetCamZ = carZ - cameraDistance;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.position.y = cameraHeight;
            camera.lookAt(car.position);
            
            // Update UI
            document.getElementById('speed-value').innerText = Math.floor(Math.abs(currentSpeed));
        }
        
        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1a2a);
            scene.fog = new THREE.FogExp2(0x0a1a2a, 0.008);
            
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 3.2, 7);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 12, 8);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 30;
            mainLight.shadow.camera.left = -10;
            mainLight.shadow.camera.right = 10;
            mainLight.shadow.camera.top = 10;
            mainLight.shadow.camera.bottom = -10;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466aa, 0.4);
            fillLight.position.set(0, 5, 0);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0xffaa66, 0.3);
            backLight.position.set(0, 2, -5);
            scene.add(backLight);
            
            // Ground plane for shadows
            const groundPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 100),
                new THREE.ShadowMaterial({ opacity: 0.3, color: 0x000000, transparent: true })
            );
            groundPlane.rotation.x = -Math.PI/2;
            groundPlane.position.y = -0.1;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);
            
            // Create car
            car = createCar(carColor, vehicleType);
            car.castShadow = true;
            car.receiveShadow = true;
            scene.add(car);
            
            // Generate world with curves
            generateInfiniteWorld();
            
            // Reset position
            carZ = 0;
            carX = 0;
            currentSpeed = 0;
            carRotation = 0;
            
            // Animation loop
            let lastTime = performance.now();
            function animate() {
                const now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                updatePhysics(delta);
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Event handlers
        document.getElementById('start-game').addEventListener('click', () => {
            vehicleType = document.querySelector('.vehicle-option.selected').getAttribute('data-vehicle');
            carColor = document.querySelector('.color-swatch.selected').getAttribute('data-color');
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('speedometer').classList.remove('hidden');
            document.getElementById('instruction').classList.remove('hidden');
            
            initGame();
            
            // Setup pedal controls
            const gasPedal = document.getElementById('gas-pedal');
            const brakePedal = document.getElementById('brake-pedal');
            
            const startGas = () => { gasPressed = true; };
            const endGas = () => { gasPressed = false; };
            const startBrake = () => { brakePressed = true; };
            const endBrake = () => { brakePressed = false; };
            
            gasPedal.addEventListener('mousedown', startGas);
            gasPedal.addEventListener('mouseup', endGas);
            gasPedal.addEventListener('mouseleave', endGas);
            gasPedal.addEventListener('touchstart', startGas);
            gasPedal.addEventListener('touchend', endGas);
            
            brakePedal.addEventListener('mousedown', startBrake);
            brakePedal.addEventListener('mouseup', endBrake);
            brakePedal.addEventListener('mouseleave', endBrake);
            brakePedal.addEventListener('touchstart', startBrake);
            brakePedal.addEventListener('touchend', endBrake);
            
            // Steering wheel with rotation
            const wheel = document.getElementById('steering-wheel');
            let active = false;
            let startX = 0;
            let currentRotate = 0;
            
            const handleMove = (clientX) => {
                if (!active) return;
                let delta = (clientX - startX) / 40;
                delta = Math.min(0.8, Math.max(-0.8, delta));
                steeringInput = delta;
                const rotationDeg = delta * 60;
                wheel.style.transform = `rotate(${rotationDeg}deg)`;
                currentRotate = rotationDeg;
            };
            
            const handleStart = (e) => {
                active = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                startX = clientX;
                e.preventDefault();
            };
            
            const handleEnd = () => {
                active = false;
                steeringInput = 0;
                wheel.style.transform = `rotate(0deg)`;
                currentRotate = 0;
            };
            
            wheel.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', (e) => { if (active) handleMove(e.clientX); });
            window.addEventListener('mouseup', handleEnd);
            
            wheel.addEventListener('touchstart', handleStart);
            window.addEventListener('touchmove', (e) => { if (active && e.touches[0]) handleMove(e.touches[0].clientX); });
            window.addEventListener('touchend', handleEnd);
        });
        
        // Selection handlers
        document.querySelectorAll('.vehicle-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.vehicle-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });
        
        document.querySelectorAll('.color-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                sw.classList.add('selected');
            });
        });
        
        document.querySelector('.vehicle-option').classList.add('selected');
        document.querySelector('.color-swatch').classList.add('selected');
    </script>
</body>
</html>
